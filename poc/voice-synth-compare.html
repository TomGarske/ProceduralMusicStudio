<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Synthesis POC - Pink Trombone</title>
  <script src="script/component-noui.js" type="module"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(circle at top, #20354d 0%, #101824 52%, #0a1018 100%);
      color: #e6edf7;
      padding: 24px;
    }
    .app {
      max-width: 960px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }
    h1 {
      text-align: center;
      color: #9ed7ff;
      font-size: clamp(1.8rem, 3vw, 2.6rem);
    }
    .subtitle {
      text-align: center;
      color: #9fb0c4;
      line-height: 1.5;
      max-width: 760px;
      margin: 0 auto;
    }
    .card {
      background: rgba(18, 28, 40, 0.92);
      border: 1px solid rgba(116, 170, 214, 0.24);
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.28);
      display: grid;
      gap: 18px;
    }
    .section-title {
      color: #e7c878;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .controls {
      display: grid;
      gap: 12px;
    }
    label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: #bfd0df;
      font-size: 0.92rem;
    }
    label span {
      min-width: 60px;
      text-align: right;
      color: #9ed7ff;
      font-variant-numeric: tabular-nums;
    }
    input[type="range"] {
      width: 100%;
      accent-color: #e7c878;
    }
    .grid {
      display: grid;
      gap: 10px;
    }
    .button-row,
    .note-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    button {
      background: #16304b;
      color: #9ed7ff;
      border: 1px solid #285781;
      border-radius: 8px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.08s ease;
    }
    button:hover {
      background: #20476d;
      border-color: #4e87ba;
    }
    button:active { transform: scale(0.98); }
    .button-row button.active {
      background: #2d5b47;
      border-color: #e7c878;
      color: #f3dc9c;
    }
    .note-row button {
      min-width: 62px;
      padding: 7px 10px;
      font-size: 0.84rem;
    }
    .status {
      min-height: 20px;
      color: #8ea2b8;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
<pink-trombone style="display:none"></pink-trombone>

<div class="app">
  <h1>Pink Trombone Voice POC</h1>
  <p class="subtitle">
    Crew-vocal experiments for the sea shanty project using Pink Trombone as the single synthesis path.
    This page focuses on vowel shaping, note triggering, and a short shanty phrase.
  </p>

  <div class="card">
    <div class="section-title">Pink Trombone Controls</div>

    <div class="controls">
      <label>Pitch (Hz) <span id="ptPitchVal">146</span></label>
      <input type="range" id="ptPitch" min="80" max="400" value="146" step="1" oninput="ptSetPitch(this.value)">

      <label>Tenseness <span id="ptTenseVal">0.6</span></label>
      <input type="range" id="ptTense" min="0" max="1" value="0.6" step="0.01" oninput="ptSetTenseness(this.value)">

      <label>Vibrato <span id="ptVibVal">0.5</span></label>
      <input type="range" id="ptVib" min="0" max="1" value="0.5" step="0.01" oninput="ptSetVibrato(this.value)">
    </div>

    <div class="grid">
      <div class="section-title">Vowels</div>
      <div class="button-row">
        <button onclick="ptVowel('OH', 12.6, 2.3)">OH</button>
        <button onclick="ptVowel('AH', 14.93, 2.78)">AH</button>
        <button onclick="ptVowel('EH', 19.4, 3.43)">EH</button>
        <button onclick="ptVowel('EE', 27.2, 2.2)">EE</button>
        <button onclick="ptVowel('OO', 22.8, 2.05)">OO</button>
        <button onclick="ptVowel('UH', 17.8, 2.46)">UH</button>
      </div>
    </div>

    <div class="grid">
      <div class="section-title">Notes</div>
      <div class="note-row" id="ptNotes"></div>
    </div>

    <div class="grid">
      <div class="section-title">Phrase</div>
      <div class="button-row">
        <button onclick="ptShantyPhrase()">Play Shanty Phrase</button>
        <button onclick="ptStop()">Stop</button>
      </div>
    </div>

    <p class="status" id="ptStatus">Loading Pink Trombone…</p>
  </div>
</div>

<script>
const NOTES_DM = {
  D3: 146.83,
  E3: 164.81,
  F3: 174.61,
  G3: 196.0,
  A3: 220.0,
  Bb3: 233.08,
  C4: 261.63,
  D4: 293.66,
  E4: 329.63,
  F4: 349.23,
};

const SHANTY_PHRASE = [
  { note: 'D3', syllable: 'OH', dur: 0.6 },
  { note: 'F3', syllable: 'EH', dur: 0.5 },
  { note: 'A3', syllable: 'AH', dur: 0.5 },
  { note: 'G3', syllable: 'AH', dur: 0.25 },
  { note: 'F3', syllable: 'EE', dur: 0.6 },
  { note: 'D3', syllable: 'OH', dur: 0.8 },
];

let actx = null;
let ptElement = null;
let ptReady = false;
let ptTimeout = null;

const PT_VOWELS = {
  OH: { idx: 12.6, dia: 2.3 },
  AH: { idx: 14.93, dia: 2.78 },
  EH: { idx: 19.4, dia: 3.43 },
  EE: { idx: 27.2, dia: 2.2 },
  OO: { idx: 22.8, dia: 2.05 },
  UH: { idx: 17.8, dia: 2.46 },
};

function ensureAudioCtx() {
  if (!actx) actx = new AudioContext();
  if (actx.state === 'suspended') actx.resume();
  return actx;
}

async function ptInit() {
  await customElements.whenDefined('pink-trombone');
  ptElement = document.querySelector('pink-trombone');
  if (!ptElement) {
    document.getElementById('ptStatus').textContent = 'Error: pink-trombone element not found';
    return;
  }

  try {
    const ctx = ensureAudioCtx();
    await ptElement.setAudioContext(ctx);
    ptElement.connect(ctx.destination);
    ptReady = true;
    document.getElementById('ptStatus').textContent = 'Ready';
  } catch (e) {
    document.getElementById('ptStatus').textContent = 'Error: ' + e.message;
    console.error('Pink Trombone init error:', e);
  }
}

function ptSetPitch(hz) {
  document.getElementById('ptPitchVal').textContent = hz;
  if (!ptReady) return;
  const t = ptElement.audioContext.currentTime;
  ptElement.parameters.frequency.linearRampToValueAtTime(Number(hz), t + 0.05);
}

function ptSetTenseness(v) {
  document.getElementById('ptTenseVal').textContent = v;
  if (!ptReady) return;
  const tv = Number(v);
  const t = ptElement.audioContext.currentTime;
  const tenseness = 1 - Math.cos(tv * Math.PI * 0.5);
  ptElement.parameters.tenseness.linearRampToValueAtTime(tenseness, t + 0.05);
  ptElement.parameters.loudness.linearRampToValueAtTime(Math.pow(tenseness, 0.25), t + 0.05);
}

function ptSetVibrato(v) {
  document.getElementById('ptVibVal').textContent = v;
  if (!ptReady) return;
  const t = ptElement.audioContext.currentTime;
  ptElement.parameters.vibrato.gain.linearRampToValueAtTime(Number(v) * 0.01, t + 0.05);
}

function ptVowel(name, idx, dia) {
  if (!ptReady) {
    ptInit();
    return;
  }
  ensureAudioCtx();
  const t = ptElement.audioContext.currentTime;
  ptElement.parameters.tongue.index.linearRampToValueAtTime(idx, t + 0.12);
  ptElement.parameters.tongue.diameter.linearRampToValueAtTime(dia, t + 0.12);
  ptElement.parameters.intensity.linearRampToValueAtTime(1, t + 0.02);
  ptElement.start();
  document.getElementById('ptStatus').textContent = 'Playing: ' + name;

  clearTimeout(ptTimeout);
  ptTimeout = setTimeout(() => {
    ptElement.parameters.intensity.linearRampToValueAtTime(0, ptElement.audioContext.currentTime + 0.3);
    setTimeout(() => ptElement.stop(), 400);
    document.getElementById('ptStatus').textContent = 'Ready';
  }, 1200);
}

function ptPlayNote(noteName) {
  if (!ptReady) return;
  const hz = NOTES_DM[noteName];
  ptSetPitch(hz);
  document.getElementById('ptPitch').value = hz;
  ptVowel('OH', 12.6, 2.3);
}

async function ptShantyPhrase() {
  if (!ptReady) return;
  ensureAudioCtx();
  const ctx = ptElement.audioContext;
  ptElement.start();
  ptElement.parameters.intensity.setValueAtTime(1, ctx.currentTime);
  document.getElementById('ptStatus').textContent = 'Playing shanty phrase…';

  let time = ctx.currentTime + 0.05;
  for (const step of SHANTY_PHRASE) {
    const hz = NOTES_DM[step.note];
    const vowel = PT_VOWELS[step.syllable] || PT_VOWELS.OH;

    ptElement.parameters.frequency.linearRampToValueAtTime(hz, time + 0.03);
    ptElement.parameters.tongue.index.linearRampToValueAtTime(vowel.idx, time + 0.08);
    ptElement.parameters.tongue.diameter.linearRampToValueAtTime(vowel.dia, time + 0.08);

    if (time > ctx.currentTime + 0.1) {
      ptElement.parameters.intensity.setValueAtTime(0.2, time - 0.04);
      ptElement.parameters.intensity.linearRampToValueAtTime(1, time + 0.04);
    }
    time += step.dur;
  }

  ptElement.parameters.intensity.linearRampToValueAtTime(0, time + 0.4);
  const totalMs = (time - ctx.currentTime + 0.6) * 1000;
  clearTimeout(ptTimeout);
  ptTimeout = setTimeout(() => {
    ptElement.stop();
    document.getElementById('ptStatus').textContent = 'Ready';
  }, totalMs);
}

function ptStop() {
  clearTimeout(ptTimeout);
  if (ptReady) {
    ptElement.parameters.intensity.linearRampToValueAtTime(0, ptElement.audioContext.currentTime + 0.1);
    setTimeout(() => ptElement.stop(), 150);
  }
  document.getElementById('ptStatus').textContent = 'Stopped';
}

{
  const container = document.getElementById('ptNotes');
  for (const name of Object.keys(NOTES_DM)) {
    const btn = document.createElement('button');
    btn.textContent = name;
    btn.onclick = () => ptPlayNote(name);
    container.appendChild(btn);
  }
}

window.addEventListener('DOMContentLoaded', () => {
  ptInit();
});
</script>
</body>
</html>
