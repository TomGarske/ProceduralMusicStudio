<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Sea Shanty Studio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --waveform-h:   143px;  /* ~25% shorter than prior 190px shared strip */
      --arrangement-h: 179px; /* 75% of prior 238px strip */
      --bg:        #0d0d0d;
      --bg2:       #121212;
      --bg3:       #1a1a1a;
      --bg4:       #222222;
      --border:    #2a2a2a;
      --cyan:      #00d4ff;
      --cyan-dim:  #007fa0;
      --red:       #ff1744;
      --green:     #00e676;
      --amber:     #ffab00;
      --text:      #e0e0e0;
      --text-dim:  #666;
      --text-mid:  #999;
      --radius:    6px;
      --pad:       14px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
      font-size: 13px;
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    #app {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 20px 60px;
      display: grid;
      gap: 18px;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 18px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }
    header h1 {
      font-size: 17px;
      font-weight: 600;
      color: var(--cyan);
      letter-spacing: 0.04em;
      flex: 1;
    }
    header h1 span { color: var(--text-dim); font-weight: 400; }

    #status-pill {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 100px;
      border: 1px solid var(--border);
      color: var(--text-dim);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: all 0.3s;
    }
    #status-pill.playing { border-color: var(--green); color: var(--green); }

    /* ── Panel ───────────────────────────────────────────────────────────── */
    .panel {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--pad);
    }
    .panel-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    /* ── Transport ───────────────────────────────────────────────────────── */
    #transport {
      display: grid;
      grid-template-columns: auto 1fr 1fr 1fr minmax(180px, 1.1fr);
      align-items: end;
      gap: 14px 16px;
    }
    #transport #transport-play-group { align-self: center; }
    #transport #info-row { justify-self: end; min-width: 0; }

    #transport-play-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #btn-prev-shanty,
    #btn-next-shanty {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--text-mid);
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    #btn-prev-shanty:hover,
    #btn-next-shanty:hover {
      border-color: var(--cyan-dim);
      color: var(--cyan);
      background: rgba(0,212,255,0.08);
    }
    #btn-prev-shanty:active,
    #btn-next-shanty:active { transform: scale(0.93); }
    #btn-prev-shanty:disabled,
    #btn-next-shanty:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      pointer-events: none;
    }
    #btn-play {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid var(--cyan);
      background: transparent;
      color: var(--cyan);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    #btn-play:hover { background: rgba(0,212,255,0.12); }
    #btn-play:active { transform: scale(0.93); }
    #btn-play.playing { border-color: var(--red); color: var(--red); }
    #btn-play.playing:hover { background: rgba(255,23,68,0.12); }

    /* ── Sliders ─────────────────────────────────────────────────────────── */
    .ctrl {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .ctrl-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-mid);
    }
    .ctrl-label span:last-child { color: var(--cyan); font-variant-numeric: tabular-nums; }
    #vol-display.boost { color: var(--amber); }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--cyan);
      border: 2px solid var(--bg);
      box-shadow: 0 0 6px rgba(0,212,255,0.5);
      transition: transform 0.1s;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
    input[type=range].layer-slider::-webkit-slider-thumb { background: var(--layer-color); box-shadow: 0 0 4px rgba(255,171,0,0.22); }
    input[type=range].layer-slider.muted::-webkit-slider-thumb { background: var(--text-dim); box-shadow: none; }

    /* ── Phase timeline ──────────────────────────────────────────────────── */
    #phase-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .phase-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 96px;
    }
    .phase-item-head {
      display: flex;
      align-items: stretch;
      gap: 0;
      min-width: 0;
    }
    .phase-item-head .phase-btn {
      flex: 1;
      min-width: 0;
      border-radius: var(--radius) 0 0 var(--radius);
      border-right: none;
    }
    .phase-item-head .phase-remove {
      flex: 0 0 0;
      align-self: stretch;
      border: 1px solid var(--border);
      border-radius: 0 var(--radius) var(--radius) 0;
      background: var(--bg3);
      color: var(--text-dim);
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      padding: 0;
      font-family: inherit;
      opacity: 0;
      width: 0;
      min-width: 0;
      overflow: hidden;
      border-width: 0;
      pointer-events: none;
      transition: opacity 0.12s ease, color 0.15s, background 0.15s, border-color 0.15s;
    }
    .phase-item:hover .phase-item-head .phase-remove {
      flex: 0 0 24px;
      opacity: 1;
      width: 24px;
      min-width: 24px;
      border-width: 1px;
      pointer-events: auto;
    }
    .phase-item:not(:hover) .phase-item-head .phase-btn {
      border-radius: var(--radius);
      border-right: 1px solid var(--border);
    }
    .phase-item:hover .phase-item-head .phase-btn {
      border-radius: var(--radius) 0 0 var(--radius);
      border-right: none;
    }
    .phase-item-head .phase-remove:hover {
      color: var(--red);
      border-color: rgba(255, 23, 68, 0.45);
      background: rgba(255, 23, 68, 0.08);
    }
    .phase-btn {
      padding: 6px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-mid);
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.04em;
    }
    .phase-btn:hover { border-color: var(--cyan-dim); color: var(--cyan); }
    .phase-btn.active {
      border-color: var(--cyan);
      background: rgba(0,212,255,0.1);
      color: var(--cyan);
      box-shadow: 0 0 10px rgba(0,212,255,0.15);
    }
    .phase-progress {
      height: 3px;
      border-radius: 999px;
      background: var(--border);
      overflow: hidden;
    }
    .phase-progress-fill {
      height: 100%;
      width: 0%;
      background: var(--cyan);
      transition: width 0.12s linear;
    }
    /* ── Playlist ───────────────────────────────────────────────────────── */
    .playlist-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 280px;
      overflow-y: auto;
      padding-right: 4px;
      margin: 0 -4px 0 0;
    }
    .playlist-list::-webkit-scrollbar { width: 6px; }
    .playlist-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
    .playlist-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      width: 100%;
      text-align: left;
      padding: 10px 12px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      background: var(--bg3);
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .playlist-item:hover {
      border-color: var(--cyan-dim);
      background: rgba(0, 212, 255, 0.06);
    }
    .playlist-item.active {
      border-color: var(--cyan);
      background: rgba(0, 212, 255, 0.1);
      box-shadow: 0 0 0 1px rgba(0, 212, 255, 0.15);
    }
    .playlist-item-index {
      flex: 0 0 1.5em;
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
      font-size: 11px;
      padding-top: 1px;
    }
    .playlist-item-body { min-width: 0; flex: 1; }
    .playlist-item-title {
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.02em;
    }
    .playlist-item.active .playlist-item-title { color: var(--cyan); }
    .playlist-item-desc {
      font-size: 10px;
      color: var(--text-dim);
      line-height: 1.35;
      margin-top: 3px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    /* ── Phase readout + Synthesize ───────────────────────────────────────── */
    #info-row {
      display: flex;
      gap: 18px;
      align-items: center;
    }
    .info-chip {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .info-chip .info-key { color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; }
    .info-chip .info-val { color: var(--cyan); font-size: 14px; font-weight: 600; min-width: 60px; }
    .phase-btn-placeholder {
      opacity: 0.55;
      cursor: not-allowed;
      border-style: dashed !important;
    }

    /* ── Oscilloscope + Arrangement (label style; heights split) ───────────── */
    #scope-wrap,
    #arrangement-wrap {
      position: relative;
    }
    #scope {
      width: 100%;
      height: var(--waveform-h);
      display: block;
      border-radius: var(--radius);
      background: radial-gradient(ellipse 120% 80% at 50% 100%, #0a1418 0%, #060a0c 55%);
      border: 1px solid var(--border);
    }
    .viz-label {
      position: absolute;
      top: 8px;
      left: 10px;
      z-index: 1;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--cyan-dim);
      pointer-events: none;
    }
    .viz-label-row {
      left: 10px;
      right: 10px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }
    .viz-time-span {
      text-transform: none;
      letter-spacing: 0.06em;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .arrangement-live-wrap {
      display: block;
      overflow: hidden;
    }
    .arrangement-live-canvas-wrap {
      height: var(--arrangement-h);
      min-width: 0;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg2);
      overflow: hidden;
    }
    #arrangement-canvas {
      display: block;
      width: 100%;
      height: 100%;
      vertical-align: top;
    }

    /* ── Layer mixer (flat list, logical hierarchy order) ──────────────────── */
    #mixer-layers {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }
    .layer-ctrl {
      --layer-color: var(--amber);
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .layer-ctrl.inactive-phase {
      opacity: 0.68;
    }
    .layer-ctrl.inactive-toggle {
      border-color: #3a2f2f;
      box-shadow: none;
    }
    .layer-ctrl .layer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .layer-name {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--layer-color);
    }
    .layer-val {
      font-size: 11px;
      color: var(--layer-color);
      font-variant-numeric: tabular-nums;
      min-width: 28px;
      text-align: right;
    }
    .layer-val.muted { color: var(--text-dim); }
    .layer-desc {
      font-size: 10px;
      color: var(--text-dim);
    }
    .layer-chords {
      font-size: 9px;
      color: var(--text-mid);
      letter-spacing: 0.04em;
      line-height: 1.35;
    }
    .layer-chords .layer-chords-label {
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-right: 4px;
    }
    .active-wrap {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .active-wrap input {
      accent-color: var(--amber);
      width: 11px;
      height: 11px;
      cursor: pointer;
    }
    .layer-solo-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-dim);
      font-size: 9px;
      font-weight: 700;
      font-family: inherit;
      width: 22px;
      height: 20px;
      padding: 0;
      line-height: 1;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .layer-solo-btn:hover {
      border-color: var(--cyan-dim);
      color: var(--cyan);
    }
    .layer-solo-btn.active {
      border-color: var(--cyan);
      color: var(--cyan);
      background: rgba(0, 212, 255, 0.12);
      box-shadow: 0 0 8px rgba(0, 212, 255, 0.2);
    }
    .layer-edit-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-dim);
      font-size: 9px;
      font-weight: 600;
      font-family: inherit;
      padding: 2px 8px;
      cursor: pointer;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .layer-edit-btn:hover {
      border-color: var(--amber);
      color: var(--amber);
    }
    .layer-edit-btn.active {
      border-color: var(--amber);
      color: var(--amber);
      background: rgba(255, 171, 0, 0.12);
      box-shadow: 0 0 8px rgba(255, 171, 0, 0.15);
    }
    .layer-ctrl.is-solo-muted {
      opacity: 0.55;
    }
    .layer-ctrl.is-soloed {
      box-shadow: 0 0 0 1px rgba(0, 212, 255, 0.35);
    }
    .layer-ctrl.is-edit-focus {
      box-shadow: 0 0 0 1px rgba(255, 171, 0, 0.45);
    }

    /* ── Footer note ─────────────────────────────────────────────────────── */
    footer {
      text-align: center;
      font-size: 11px;
      color: var(--text-dim);
      padding-top: 8px;
    }
    footer a { color: var(--cyan-dim); text-decoration: none; }
    footer a:hover { color: var(--cyan); }

    @media (max-width: 640px) {
      #transport {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto;
        gap: 12px;
      }
      #transport #info-row { justify-self: stretch; }
      #transport #transport-play-group { justify-self: start; }
    }
  </style>
</head>
<body>
<!-- Keeps the OS media session / audio route active on some mobile browsers when the screen locks -->
<audio id="media-keepalive" loop playsinline preload="auto" aria-hidden="true"
  src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA=="></audio>
<div id="app">

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <header>
    <h1>Sea Shanty Studio</h1>
    <div id="status-pill">stopped</div>
  </header>

  <!-- ── Transport ───────────────────────────────────────────────────────── -->
  <div class="panel">
    <div id="transport">
      <div id="transport-play-group">
        <button type="button" id="btn-prev-shanty" title="Previous shanty" aria-label="Previous shanty">⏮</button>
        <button id="btn-play" title="Play / Stop" aria-label="Play or stop">▶</button>
        <button type="button" id="btn-next-shanty" title="Next shanty" aria-label="Next shanty">⏭</button>
      </div>

      <div class="ctrl" id="bpm-ctrl">
        <div class="ctrl-label"><span>BPM</span><span id="bpm-display">76</span></div>
        <input type="range" id="bpm-slider" min="40" max="200" value="76" step="1">
      </div>

      <div class="ctrl" id="vol-ctrl">
        <div class="ctrl-label"><span>Volume</span><span id="vol-display">100%</span></div>
        <input type="range" id="vol-slider" min="0" max="200" value="100" step="1">
      </div>

      <div class="ctrl" id="rev-ctrl">
        <div class="ctrl-label"><span>Reverb</span><span id="rev-display">22%</span></div>
        <input type="range" id="rev-slider" min="0" max="80" value="22" step="1">
      </div>

      <div id="info-row">
        <div class="info-chip">
          <span class="info-key">Phase</span>
          <span class="info-val" id="phase-val">—</span>
        </div>
      </div>

    </div>
  </div>

  <!-- ── Playlist ────────────────────────────────────────────────────────── -->
  <div class="panel" id="playlist-panel">
    <div class="panel-title">Playlist</div>
    <div id="playlist-list" class="playlist-list" role="list" aria-label="Sea shanty playlist"></div>
  </div>

  <!-- ── Phase Timeline ──────────────────────────────────────────────────── -->
  <div class="panel">
    <div class="panel-title">Shanty Phases</div>
    <div id="phase-row"></div>
  </div>

  <!-- ── Oscilloscope ────────────────────────────────────────────────────── -->
  <div class="panel" id="scope-wrap">
    <canvas id="scope"></canvas>
    <div id="scope-label" class="viz-label">Waveform</div>
  </div>

  <!-- ── Arrangement (live per-layer RMS) ─────────────────────────────────── -->
  <div class="panel" id="arrangement-panel" aria-label="Layer activity">
    <div id="arrangement-wrap">
      <div class="arrangement-live-wrap">
        <div class="arrangement-live-canvas-wrap">
          <canvas id="arrangement-canvas" width="300" height="54"></canvas>
        </div>
      </div>
      <div id="arrangement-label" class="viz-label viz-label-row">
        <span>Arrangement</span>
        <span id="arrangement-time-span" class="viz-time-span" title=""></span>
      </div>
    </div>
  </div>

  <!-- ── Layer Mixer ─────────────────────────────────────────────────────── -->
  <div class="panel">
    <div class="panel-title">Crew & Instruments — mix levels per song phase</div>
    <div id="mixer-layers"></div>
  </div>

  <footer>
    <a href="https://github.com/TomGarske/ProceduralMusicStudio" target="_blank">GitHub</a>
    &nbsp;·&nbsp; 76 BPM · Sea Shanty · Web Audio API
  </footer>

</div>

<script src="music_engine_web.js"></script>
<script src="arrangement_live.js"></script>
<script>
// ── Layer definitions (order = rhythm → low end → harmony → melody → texture) ─
const LAYERS = [
  { id:'thump',     label:'Fist Thump',     desc:'Knuckle-on-barrel strike on beats 1 & 3', default:50 },
  { id:'beatpulse', label:'Deck Stomp',     desc:'Boot-stomp rhythmic pulse', default:50 },
  { id:'sub',       label:'Hull Rumble',    desc:'Low drone foundation', default:50 },
  { id:'bass',      label:'Bass Line',      desc:'Root-following bass', default:50 },
  { id:'piano',     label:'Concertina Chords', desc:'Chord stabs on the downbeat', default:50 },
  { id:'pad',       label:'Squeezebox Drone', desc:'Sustained bellows drone with vibrato', default:50 },
  { id:'drone',     label:'Hurdy Drone',    desc:'Held root & fifth (hauling phases)', default:50 },
  { id:'arp',       label:'Fiddle Melody',  desc:'Reedy melodic pattern', default:50 },
  { id:'echo',      label:'Fiddle Echo',    desc:'Delayed fiddle copy for width', default:50 },
  { id:'shim',      label:'Ship\'s Bell',   desc:'Bell ring accent on downbeats', default:50 },
  { id:'voices',    label:'Crew Chorus',    desc:'Chanting crew with vowel formants', default:50 },
];
/** Layers that follow the phase chord progression (shown in the mixer). */
const CHORD_LAYER_IDS = ['piano', 'bass', 'voices'];

/** Fallback phase labels if engine is not ready yet */
const ALL_SCRIPTED_PHASES = [
  { id: 'shanty_call', label: 'Shanty Call' },
  { id: 'shanty_response', label: 'Crew Response' },
  { id: 'full_crew', label: 'Full Crew' },
  { id: 'heave_ho', label: 'Heave Ho!' },

  { id: 'all_hands', label: 'All Hands!' },

let presetManifestList = [];
let activePresetJson = null;
let progressEls = {};
function refreshProgressEls() {
  progressEls = Object.fromEntries(
    Array.from(document.querySelectorAll('.phase-progress-fill')).map(el => [el.dataset.progress, el])
  );
}
function renderPhaseRow() {

/** Layer slider 0–200 → multiplier 0–2× phase level (must match engine `setLayer` max). */
const LAYER_SLIDER_MAX = 200;
const LAYER_MULT_MAX = 2;

// ── Engine boot ──────────────────────────────────────────────────────────
let engine = null;
let scopeRaf = null;
const layerActive = {};  // active/inactive state per layer
let soloLayerId = null;  // null = all layers audible per mixer; else only this id is heard
let arrangementFocusLayerId = null;  // set by Edit: solo + highlight card + arrangement shows only this layer

function syncArrangementVizFocus() {
  if (window.ArrangementLive && typeof ArrangementLive.setFocusLayer === 'function') {

  }
}

const mediaKeepalive = document.getElementById('media-keepalive');

function updateChordLayerLabels() {
  const seq = engine?.getState?.()?.chordSeq;
  const inner = seq && seq.length
    ? `<span class="layer-chords-label">Chords</span><span>${seq.join(' · ')}</span>`
    : `<span class="layer-chords-label">Chords</span><span>—</span>`;
  CHORD_LAYER_IDS.forEach(id => {
    const el = document.getElementById(`chords-${id}`);
    if (el) el.innerHTML = inner;
  });
}

async function bootEngine() {
  if (engine) return;
  if (!activePresetJson && presetManifestList.length) {
    try {
      const r = await fetch('presets/' + presetManifestList[0].file);
      activePresetJson = await r.json();
    } catch (e) {
      console.warn('Could not load preset file; using engine default.', e);
    }
  }
  const opts = activePresetJson ? { preset: activePresetJson } : {};
  engine = ProceduralMusic.create(opts);
  window.__PROC_ENGINE = engine;
  engine.setKey(activePresetJson?.defaults?.key ?? 'Gm');
  engine.setPhaseLoop(null);

  // Wire events
  // Cache DOM refs once — avoid querySelectorAll on every phase change
  const phaseValEl = document.getElementById('phase-val');
  let cachedPhaseBtns = Array.from(document.querySelectorAll('.phase-btn'));
  const origRenderPhaseRow = renderPhaseRow;
  renderPhaseRow = function() {
    origRenderPhaseRow();
    cachedPhaseBtns = Array.from(document.querySelectorAll('.phase-btn'));
  };

  let phaseRafPending = false;
  let lastPhaseEvent = null;
  engine.on('phase', (data) => {
    lastPhaseEvent = data;
    if (!phaseRafPending) {
      phaseRafPending = true;
      requestAnimationFrame(() => {
        phaseRafPending = false;
        if (!lastPhaseEvent) return;
        const { id, label } = lastPhaseEvent;
        phaseValEl.textContent = label;
        for (let i = 0; i < cachedPhaseBtns.length; i++) {
          cachedPhaseBtns[i].classList.toggle('active', cachedPhaseBtns[i].dataset.phase === id);
        }
        updateLayerDisplayFromState(engine.getState());
        updateChordLayerLabels();
      });
    }
  });

  // Throttle MediaMetadata — at most once per 2s (allocations are expensive)
  let lastMediaMetaUpdate = 0;
  engine.on('phase', ({ id, label }) => {
    const now = performance.now();
    if (now - lastMediaMetaUpdate < 2000) return;
    lastMediaMetaUpdate = now;
    if ('mediaSession' in navigator && activePresetJson) {
      try {
        navigator.mediaSession.metadata = new MediaMetadata({
          title: activePresetJson.name || 'Sea Shanty',
          artist: `${label} · Sea Shanty Studio`,
          album: 'Sea shanties',
        });
      } catch (_) {}
    }
  });

  let beatRafPending = false;
  let lastBeatData = null;
  engine.on('beat', (data) => {
    lastBeatData = data;
    if (!beatRafPending) {
      beatRafPending = true;
      requestAnimationFrame(() => {
        beatRafPending = false;
        if (!lastBeatData) return;
        const { phase, phaseProgress } = lastBeatData;
        const keys = Object.keys(progressEls);
        for (let i = 0; i < keys.length; i++) {
          progressEls[keys[i]].style.width = keys[i] === phase ? `${Math.round((phaseProgress || 0) * 100)}%` : '0%';
        }
      });
    }
  });

  // Sync sliders to the loaded preset's defaults, then push to engine
  const presetBpm = activePresetJson?.defaults?.bpm ?? 76;
  const presetRev = Math.round((activePresetJson?.defaults?.reverb ?? 0.22) * 100);
  document.getElementById('bpm-slider').value = presetBpm;
  document.getElementById('bpm-display').textContent = Math.round(presetBpm);
  document.getElementById('rev-slider').value = presetRev;
  document.getElementById('rev-display').textContent = presetRev + '%';
  engine.setVolume(parseFloat(document.getElementById('vol-slider').value) / 100);
  engine.setReverb(presetRev / 100);
  engine.setBPM(presetBpm);
  updateLayerDisplayFromState(engine.getState());
  syncAllLayersToEngine();
  updateChordLayerLabels();

  renderPhaseRow();
  updateMediaSessionPlaybackState();
  updateMediaSessionMetadata();

  // Start oscilloscope
  startScope();
}

// ── Play / Stop ───────────────────────────────────────────────────────────
const btnPlay = document.getElementById('btn-play');
const statusPill = document.getElementById('status-pill');

btnPlay.addEventListener('click', async () => {
  await bootEngine();
  const state = engine.getState();
  if (state.transportActive) {
    engine.stop();
    try { mediaKeepalive.pause(); } catch (_) {}
    btnPlay.classList.remove('playing');
    btnPlay.innerHTML = '▶';
    statusPill.textContent = 'stopped';
    statusPill.classList.remove('playing');
    updateMediaSessionPlaybackState();
  } else {
    engine.play();
    try {
      mediaKeepalive.volume = 0.02;
      mediaKeepalive.play().catch(() => {});
    } catch (_) {}
    btnPlay.classList.add('playing');
    btnPlay.innerHTML = '■';
    statusPill.textContent = 'playing';
    statusPill.classList.add('playing');
    updateMediaSessionPlaybackState();
    updateMediaSessionMetadata();
  }
});

// ── Layer mixer (flat list, hierarchy order) ───────────────────────────
const mixerLayersEl = document.getElementById('mixer-layers');
function getEffectiveLayerValue(layerId, sliderVal) {
  if (!layerActive[layerId]) return 0;
  if (soloLayerId !== null && layerId !== soloLayerId) return 0;
  return sliderVal;
}
function updateSoloStyles() {
  document.querySelectorAll('.layer-solo-btn').forEach(btn => {
    const id = btn.dataset.layer;
    btn.classList.toggle('active', soloLayerId !== null && soloLayerId === id);
  });
  document.querySelectorAll('.layer-ctrl').forEach(card => {
    const sl = card.querySelector('.layer-slider');
    const id = sl?.dataset?.layer;
    if (!id) return;
    card.classList.toggle('is-soloed', soloLayerId !== null && soloLayerId === id);
    card.classList.toggle('is-solo-muted', soloLayerId !== null && soloLayerId !== id);
  });
}
function updateEditStyles() {
  document.querySelectorAll('.layer-edit-btn').forEach(btn => {
    const id = btn.dataset.layer;
    btn.classList.toggle('active', arrangementFocusLayerId === id);
  });
  document.querySelectorAll('.layer-ctrl').forEach(card => {
    const sl = card.querySelector('.layer-slider');
    const id = sl?.dataset?.layer;
    if (!id) return;
    card.classList.toggle('is-edit-focus', arrangementFocusLayerId === id);
  });
}
function syncLayerToEngine(layerId) {
  if (!engine) return;
  const slider = document.getElementById(`sl-${layerId}`);
  if (!slider) return;
  const desiredVal = parseInt(slider.value, 10) / 100;
  const state = engine.getState();
  const baseVal = state?.phaseLevels?.[layerId] ?? 0;
  const effectiveVal = getEffectiveLayerValue(layerId, desiredVal);
  // Phase base 0: ratio is undefined; use 1 when the layer is active so gains follow the
  // phase once it turns on (otherwise mult stays 0 forever after intro).
  let mult;
  if (baseVal > 0) {
    mult = Math.min(LAYER_MULT_MAX, effectiveVal / baseVal);
  } else {
    mult = effectiveVal > 0 ? 1 : 0;
  }
  engine.setLayer(layerId, mult);
}
function syncAllLayersToEngine() {
  if (!engine) return;
  LAYERS.forEach(layer => syncLayerToEngine(layer.id));
}
const layerDomCache = {};
function cacheLayerDom() {
  LAYERS.forEach(layer => {
    const slider = document.getElementById(`sl-${layer.id}`);
    const valEl = document.getElementById(`lv-${layer.id}`);
    const card = slider?.closest('.layer-ctrl');
    if (slider && valEl && card) {
      layerDomCache[layer.id] = { slider, valEl, card };
    }
  });
}
function updateLayerDisplayFromState(state) {
  if (!state) return;
  const phaseLevels = state.phaseLevels || {};
  for (let i = 0; i < LAYERS.length; i++) {
    const layer = LAYERS[i];
    const cached = layerDomCache[layer.id];
    if (!cached) continue;
    const { slider, valEl, card } = cached;
    const base = phaseLevels[layer.id] ?? 0;
    const effectiveVal = getEffectiveLayerValue(layer.id, base);
    slider.value = Math.round(base * 100);
    valEl.textContent = base.toFixed(2);
    valEl.classList.toggle('muted', effectiveVal === 0);
    slider.classList.toggle('muted', effectiveVal === 0);
    card.classList.toggle('inactive-phase', !layerActive[layer.id]);
  }
}

function buildLayerCard(layer) {
  const card = document.createElement('div');
  card.className = 'layer-ctrl';
  const defaultVal = layer.default ?? 50;
  const chordBlock = CHORD_LAYER_IDS.includes(layer.id)
    ? `<div class="layer-chords" id="chords-${layer.id}"></div>`
    : '';
  card.innerHTML = `
    <div class="layer-header">
      <span class="layer-name">${layer.label}</span>
      <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;justify-content:flex-end">
        <span class="layer-val ${defaultVal === 0 ? 'muted' : ''}" id="lv-${layer.id}">${(defaultVal / 100).toFixed(2)}</span>
        <button type="button" class="layer-solo-btn" data-layer="${layer.id}" title="Isolate this layer (solo)">S</button>
        <button type="button" class="layer-edit-btn" data-layer="${layer.id}" title="Solo this layer; arrangement shows only this layer">Edit</button>
        <label class="active-wrap" title="Enable/disable this layer">
          <input type="checkbox" id="active-${layer.id}" data-layer="${layer.id}" checked>
          <span>Active</span>
        </label>
      </div>
    </div>
    <input type="range" class="layer-slider" id="sl-${layer.id}"
           min="0" max="${LAYER_SLIDER_MAX}" value="${defaultVal}" step="1" data-layer="${layer.id}">
    <div class="layer-desc">${layer.desc}</div>
    ${chordBlock}
  `;

  const slider = card.querySelector(`#sl-${layer.id}`);
  const valEl  = card.querySelector(`#lv-${layer.id}`);
  const activeChk = card.querySelector(`#active-${layer.id}`);
  layerActive[layer.id] = true;
  slider.classList.toggle('muted', parseInt(slider.value) === 0);

  slider.addEventListener('wheel', e => { e.preventDefault(); }, { passive: false });
  slider.addEventListener('input', e => {
    const v = parseInt(e.target.value, 10) / 100;
    valEl.textContent = v.toFixed(2);
    syncLayerToEngine(layer.id);
    valEl.classList.toggle('muted', v === 0);
    slider.classList.toggle('muted', v === 0);
  });

  const soloBtn = card.querySelector('.layer-solo-btn');
  soloBtn.addEventListener('click', () => {
    soloLayerId = soloLayerId === layer.id ? null : layer.id;
    if (arrangementFocusLayerId !== null && soloLayerId !== arrangementFocusLayerId) {
      arrangementFocusLayerId = null;
    }
    updateSoloStyles();
    updateEditStyles();
    syncArrangementVizFocus();
    syncAllLayersToEngine();
    updateLayerDisplayFromState(engine?.getState());
  });

  const editBtn = card.querySelector('.layer-edit-btn');
  editBtn.addEventListener('click', () => {
    if (arrangementFocusLayerId === layer.id) {
      arrangementFocusLayerId = null;
      soloLayerId = null;
    } else {
      arrangementFocusLayerId = layer.id;
      soloLayerId = layer.id;
    }
    updateSoloStyles();
    updateEditStyles();
    syncArrangementVizFocus();
    syncAllLayersToEngine();
    updateLayerDisplayFromState(engine?.getState());
  });

  activeChk.addEventListener('change', () => {
    layerActive[layer.id] = activeChk.checked;
    card.classList.toggle('inactive-toggle', !activeChk.checked);
    syncLayerToEngine(layer.id);
    updateLayerDisplayFromState(engine?.getState());
  });
  return card;
}

// ── Oscilloscope ──────────────────────────────────────────────────────────
const canvas = document.getElementById('scope');
const ctx2d  = canvas.getContext('2d');
let scopeCssW = 0;
let scopeCssH = 0;
let scopeTimeBuf = null;

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  scopeCssW = rect.width;
  scopeCssH = rect.height;
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  ctx2d.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function drawScope() {
  scopeRaf = requestAnimationFrame(drawScope);

  const W = scopeCssW;
  const H = scopeCssH;
  const pad = 10;
  const mid = H * 0.5;

  const bgGrad = ctx2d.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#0a1218');
  bgGrad.addColorStop(1, '#05080c');
  ctx2d.fillStyle = bgGrad;
  ctx2d.fillRect(0, 0, W, H);

  ctx2d.strokeStyle = 'rgba(0, 212, 255, 0.07)';
  ctx2d.lineWidth = 1;
  ctx2d.beginPath();
  ctx2d.moveTo(0, mid);
  ctx2d.lineTo(W, mid);
  ctx2d.stroke();
  ctx2d.strokeStyle = 'rgba(0, 212, 255, 0.04)';
  ctx2d.beginPath();
  ctx2d.moveTo(0, H * 0.28);
  ctx2d.lineTo(W, H * 0.28);
  ctx2d.moveTo(0, H * 0.72);
  ctx2d.lineTo(W, H * 0.72);
  ctx2d.stroke();

  if (!engine) {
    ctx2d.strokeStyle = 'rgba(0,212,255,0.12)';
    ctx2d.lineWidth = 1.2;
    ctx2d.beginPath();
    ctx2d.moveTo(pad, mid);
    ctx2d.lineTo(W - pad, mid);
    ctx2d.stroke();
    return;
  }

  const analyser = engine.getAnalyser();
  if (!analyser) return;

  if (!scopeTimeBuf || scopeTimeBuf.length !== analyser.fftSize) {
    scopeTimeBuf = new Float32Array(analyser.fftSize);
  }
  analyser.getFloatTimeDomainData(scopeTimeBuf);
  const buf = scopeTimeBuf;
  const playing = btnPlay.classList.contains('playing');

  const plotW = Math.max(1, W - pad * 2);
  const stride = Math.max(1, Math.floor(buf.length / plotW));
  let peak = 0.0001;
  for (let i = 0; i < buf.length; i += stride) {
    peak = Math.max(peak, Math.abs(buf[i]));
  }
  const gain = Math.min(2.4, 0.42 / peak);

  const pts = [];
  let prev = 0;
  let x = 0;
  for (let i = 0; i < buf.length && x < plotW; i += stride, x++) {
    const sm = prev * 0.28 + buf[i] * 0.72;
    prev = sm;
    const y = mid - sm * gain * (H * 0.4);
    pts.push({ x: pad + x, y });
  }
  if (pts.length < 2) return;

  const fGrad = ctx2d.createLinearGradient(0, 0, 0, H);
  fGrad.addColorStop(0, playing ? 'rgba(0, 212, 255, 0.12)' : 'rgba(0, 212, 255, 0.04)');
  fGrad.addColorStop(1, 'rgba(0, 212, 255, 0)');
  ctx2d.beginPath();
  ctx2d.moveTo(pts[0].x, mid);
  for (let i = 0; i < pts.length; i++) ctx2d.lineTo(pts[i].x, pts[i].y);
  ctx2d.lineTo(pts[pts.length - 1].x, mid);
  ctx2d.closePath();
  ctx2d.fillStyle = fGrad;
  ctx2d.fill();

  ctx2d.beginPath();
  ctx2d.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx2d.lineTo(pts[i].x, pts[i].y);
  ctx2d.strokeStyle = playing ? 'rgba(0, 230, 255, 0.92)' : 'rgba(0, 212, 255, 0.32)';
  ctx2d.lineWidth = playing ? 1.45 : 1;
  ctx2d.lineJoin = 'round';
  ctx2d.lineCap = 'round';
  ctx2d.shadowBlur = playing ? 5 : 0;
  ctx2d.shadowColor = 'rgba(0, 212, 255, 0.45)';
  ctx2d.stroke();
  ctx2d.shadowBlur = 0;
}

function startScope() {
  if (!scopeRaf) drawScope();
}

// Start idle scope immediately
drawScope();

// ── Keyboard shortcuts ────────────────────────────────────────────────────
document.addEventListener('keydown', async e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') {
    e.preventDefault();
    btnPlay.click();
  }
  // Number keys 1–9 → Nth active scripted phase
  const idx = parseInt(e.key, 10) - 1;
  if (idx >= 0 && idx < 9) {
    await bootEngine();
    const phases = engine.getPhases();
    if (idx < phases.length) engine.seekToPhase(phases[idx].id);
  }
});

let currentPresetFile = null;

async function initPresets() {
  try {
    const m = await fetch('presets/manifest.json').then(r => r.json());
    presetManifestList = m.presets || [];
    const first = presetManifestList[0];
    if (first) {
      const r = await fetch('presets/' + first.file);
      activePresetJson = await r.json();
      currentPresetFile = first.file;
    }
  } catch (e) {
    console.warn('Preset manifest/load failed; using bundled engine default.', e);
    presetManifestList = [];
  }
}

function renderPlaylist() {
  const list = document.getElementById('playlist-list');
  if (!list) return;
  list.innerHTML = '';
  presetManifestList.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.type = 'button';

    btn.dataset.file = p.file;

      <span class="playlist-item-index">${String(i + 1).padStart(2, '0')}</span>

function renderPlaylistActive() {

  });

function updateSkipButtonsState() {
  const dis = presetManifestList.length < 2;
  const prev = document.getElementById('btn-prev-shanty');
  const next = document.getElementById('btn-next-shanty');
  if (prev) prev.disabled = dis;
  if (next) next.disabled = dis;
}

function updateMediaSessionMetadata() {
  if (!('mediaSession' in navigator)) return;
  try {
    const title = activePresetJson?.name || 'Sea Shanty Studio';
    const artist = 'Sea Shanty Studio · Procedural';
    navigator.mediaSession.metadata = new MediaMetadata({
      title,
      artist,
      album: 'Sea shanties',
    });
  } catch (_) {}
}

function updateMediaSessionPlaybackState() {
  if (!('mediaSession' in navigator)) return;
  try {
    const playing = engine?.getState?.()?.transportActive;
    navigator.mediaSession.playbackState = playing ? 'playing' : 'paused';
  } catch (_) {}
}

function setupMediaSession() {
  if (!('mediaSession' in navigator)) return;
  try {
    navigator.mediaSession.setActionHandler('play', async () => {
      await bootEngine();
      if (!engine.getState().transportActive) {
        engine.play();
        try {
          mediaKeepalive.volume = 0.02;
          mediaKeepalive.play().catch(() => {});
        } catch (_) {}
        btnPlay.classList.add('playing');
        btnPlay.innerHTML = '■';
        statusPill.textContent = 'playing';
        statusPill.classList.add('playing');
      }
      updateMediaSessionPlaybackState();
    });
    navigator.mediaSession.setActionHandler('pause', async () => {
      await bootEngine();
      if (engine.getState().transportActive) {
        engine.stop();
        try { mediaKeepalive.pause(); } catch (_) {}
        btnPlay.classList.remove('playing');
        btnPlay.innerHTML = '▶';
        statusPill.textContent = 'stopped';
        statusPill.classList.remove('playing');
      }
      updateMediaSessionPlaybackState();
    });
    navigator.mediaSession.setActionHandler('previoustrack', () => {
      document.getElementById('btn-prev-shanty').click();
    });
    navigator.mediaSession.setActionHandler('nexttrack', () => {
      document.getElementById('btn-next-shanty').click();
    });
    navigator.mediaSession.setActionHandler('stop', async () => {
      await bootEngine();
      if (engine.getState().transportActive) {
        engine.stop();
        try { mediaKeepalive.pause(); } catch (_) {}
        btnPlay.classList.remove('playing');
        btnPlay.innerHTML = '▶';
        statusPill.textContent = 'stopped';
        statusPill.classList.remove('playing');
      }
      updateMediaSessionPlaybackState();
    });
  } catch (e) {
    console.warn('Media Session not fully available', e);
  }
}

function getCurrentShantyIndex() {
  return presetManifestList.findIndex(p => p.file === currentPresetFile);
}

async function goToShantyDelta(delta) {
  const n = presetManifestList.length;
  if (n < 2) return;
  const i = getCurrentShantyIndex();
  if (i < 0) return;
  const next = presetManifestList[(i + delta + n) % n];
  await applyShantyFile(next.file);
}

async function applyShantyFile(file) {
  const entry = presetManifestList.find(p => p.file === file);
  if (!entry) return false;
  try {
    const r = await fetch('presets/' + file);
    activePresetJson = await r.json();
    currentPresetFile = file;
    updateLayerLabelsFromPreset(activePresetJson);
    renderPlaylistActive();
    await bootEngine();
    engine.applyPreset(activePresetJson);
    const bpm = activePresetJson.defaults?.bpm ?? 76;
    document.getElementById('bpm-slider').value = bpm;
    document.getElementById('bpm-display').textContent = Math.round(bpm);
    const rev = Math.round((activePresetJson.defaults?.reverb ?? 0.22) * 100);
    document.getElementById('rev-slider').value = rev;
    document.getElementById('rev-display').textContent = rev + '%';
    renderPhaseRow();
    engine.play();
    try {
      mediaKeepalive.volume = 0.02;
      mediaKeepalive.play().catch(() => {});
    } catch (_) {}
    const btnPlayEl = document.getElementById('btn-play');
    const statusPillEl = document.getElementById('status-pill');
    btnPlayEl.classList.add('playing');
    btnPlayEl.innerHTML = '■';
    statusPillEl.textContent = 'playing';
    statusPillEl.classList.add('playing');
    updateMediaSessionMetadata();
    updateMediaSessionPlaybackState();
    return true;
  } catch (err) {
    console.error('Failed to load preset', err);
    return false;
  }
}

document.getElementById('btn-next-shanty').addEventListener('click', () => goToShantyDelta(1));
document.getElementById('btn-prev-shanty').addEventListener('click', () => goToShantyDelta(-1));
document.getElementById('playlist-list').addEventListener('click', async e => {
  const item = e.target.closest('.playlist-item');
  if (!item?.dataset?.file) return;
  await applyShantyFile(item.dataset.file);
});

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && engine?.resumeAudioContext) {
    engine.resumeAudioContext().catch(() => {});
  }
});
window.addEventListener('pageshow', e => {
  if (e.persisted && engine?.resumeAudioContext) {
    engine.resumeAudioContext().catch(() => {});
  }
});
setupMediaSession();

// ── Preset-driven layer labels ────────────────────────────────────────
const DEFAULT_LAYER_LABELS = {};
LAYERS.forEach(l => { DEFAULT_LAYER_LABELS[l.id] = { label: l.label, desc: l.desc }; });

function updateLayerLabelsFromPreset(preset) {
  const labels = preset?.layerLabels || {};
  LAYERS.forEach(layer => {
    const custom = labels[layer.id];
    const lbl = custom?.label || DEFAULT_LAYER_LABELS[layer.id].label;
    const desc = custom?.desc || DEFAULT_LAYER_LABELS[layer.id].desc;
    const card = document.getElementById(`sl-${layer.id}`)?.closest('.layer-ctrl');
    if (!card) return;
    const nameEl = card.querySelector('.layer-name');
    const descEl = card.querySelector('.layer-desc');
    if (nameEl) nameEl.textContent = lbl;
    if (descEl) descEl.textContent = desc;
  });
}

const origBootEngine = bootEngine;
bootEngine = async function() {
  await origBootEngine();
  if (activePresetJson) {
    updateLayerLabelsFromPreset(activePresetJson);
  }
};

initPresets().then(() => {
  renderPhaseRow();
  renderPlaylist();
  updateSkipButtonsState();
  renderPlaylistActive();
  if (activePresetJson) {
    updateLayerLabelsFromPreset(activePresetJson);
  }
});
</script>
