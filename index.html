<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Procedural Music Studio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --waveform-h:   143px;  /* ~25% shorter than prior 190px shared strip */
      --arrangement-h: 179px; /* 75% of prior 238px strip */
      --bg:        #0d0d0d;
      --bg2:       #121212;
      --bg3:       #1a1a1a;
      --bg4:       #222222;
      --border:    #2a2a2a;
      --cyan:      #00d4ff;
      --cyan-dim:  #007fa0;
      --red:       #ff1744;
      --green:     #00e676;
      --amber:     #ffab00;
      --text:      #e0e0e0;
      --text-dim:  #666;
      --text-mid:  #999;
      --radius:    6px;
      --pad:       14px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
      font-size: 13px;
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    #app {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 20px 60px;
      display: grid;
      gap: 18px;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 18px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }
    header h1 {
      font-size: 17px;
      font-weight: 600;
      color: var(--cyan);
      letter-spacing: 0.04em;
      flex: 1;
    }
    header h1 span { color: var(--text-dim); font-weight: 400; }

    #status-pill {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 100px;
      border: 1px solid var(--border);
      color: var(--text-dim);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: all 0.3s;
    }
    #status-pill.playing { border-color: var(--green); color: var(--green); }

    /* ── Panel ───────────────────────────────────────────────────────────── */
    .panel {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--pad);
    }
    .panel-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    /* ── Transport ───────────────────────────────────────────────────────── */
    #transport {
      display: grid;
      grid-template-columns: auto 1fr 1fr 1fr minmax(180px, 1.1fr);
      grid-template-rows: auto auto;
      grid-template-areas:
        "play bpm vol rev info"
        "preset preset preset preset preset";
      align-items: end;
      gap: 14px 16px;
    }
    #transport #btn-play { grid-area: play; align-self: center; }
    #transport #bpm-ctrl { grid-area: bpm; }
    #transport #vol-ctrl { grid-area: vol; }
    #transport #rev-ctrl { grid-area: rev; }
    #transport #info-row { grid-area: info; justify-self: end; min-width: 0; }
    #transport #preset-ctrl {
      grid-area: preset;
      align-self: stretch;
    }

    #btn-play {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid var(--cyan);
      background: transparent;
      color: var(--cyan);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    #btn-play:hover { background: rgba(0,212,255,0.12); }
    #btn-play:active { transform: scale(0.93); }
    #btn-play.playing { border-color: var(--red); color: var(--red); }
    #btn-play.playing:hover { background: rgba(255,23,68,0.12); }

    /* ── Sliders ─────────────────────────────────────────────────────────── */
    .ctrl {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .ctrl-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-mid);
    }
    .ctrl-label span:last-child { color: var(--cyan); font-variant-numeric: tabular-nums; }
    #vol-display.boost { color: var(--amber); }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--cyan);
      border: 2px solid var(--bg);
      box-shadow: 0 0 6px rgba(0,212,255,0.5);
      transition: transform 0.1s;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
    input[type=range].layer-slider::-webkit-slider-thumb { background: var(--layer-color); box-shadow: 0 0 4px rgba(255,171,0,0.22); }
    input[type=range].layer-slider.muted::-webkit-slider-thumb { background: var(--text-dim); box-shadow: none; }

    /* ── Phase timeline ──────────────────────────────────────────────────── */
    #phase-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .phase-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 96px;
    }
    .phase-item-head {
      display: flex;
      align-items: stretch;
      gap: 0;
      min-width: 0;
    }
    .phase-item-head .phase-btn {
      flex: 1;
      min-width: 0;
      border-radius: var(--radius) 0 0 var(--radius);
      border-right: none;
    }
    .phase-item-head .phase-remove {
      flex: 0 0 0;
      align-self: stretch;
      border: 1px solid var(--border);
      border-radius: 0 var(--radius) var(--radius) 0;
      background: var(--bg3);
      color: var(--text-dim);
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      padding: 0;
      font-family: inherit;
      opacity: 0;
      width: 0;
      min-width: 0;
      overflow: hidden;
      border-width: 0;
      pointer-events: none;
      transition: opacity 0.12s ease, color 0.15s, background 0.15s, border-color 0.15s;
    }
    .phase-item:hover .phase-item-head .phase-remove {
      flex: 0 0 24px;
      opacity: 1;
      width: 24px;
      min-width: 24px;
      border-width: 1px;
      pointer-events: auto;
    }
    .phase-item:not(:hover) .phase-item-head .phase-btn {
      border-radius: var(--radius);
      border-right: 1px solid var(--border);
    }
    .phase-item:hover .phase-item-head .phase-btn {
      border-radius: var(--radius) 0 0 var(--radius);
      border-right: none;
    }
    .phase-item-head .phase-remove:hover {
      color: var(--red);
      border-color: rgba(255, 23, 68, 0.45);
      background: rgba(255, 23, 68, 0.08);
    }
    .phase-btn {
      padding: 6px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-mid);
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.04em;
    }
    .phase-btn:hover { border-color: var(--cyan-dim); color: var(--cyan); }
    .phase-btn.active {
      border-color: var(--cyan);
      background: rgba(0,212,255,0.1);
      color: var(--cyan);
      box-shadow: 0 0 10px rgba(0,212,255,0.15);
    }
    .phase-progress {
      height: 3px;
      border-radius: 999px;
      background: var(--border);
      overflow: hidden;
    }
    .phase-progress-fill {
      height: 100%;
      width: 0%;
      background: var(--cyan);
      transition: width 0.12s linear;
    }
    .phase-loop-wrap {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    /* ── Phase readout + Synthesize ───────────────────────────────────────── */
    #info-row {
      display: flex;
      gap: 18px;
      align-items: center;
    }
    .info-chip {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .info-chip .info-key { color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; }
    .info-chip .info-val { color: var(--cyan); font-size: 14px; font-weight: 600; min-width: 60px; }
    .synthesize-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 14px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--text-mid);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, box-shadow 0.2s, background 0.2s;
      white-space: nowrap;
    }
    .synthesize-btn:hover {
      border-color: var(--amber);
      color: var(--amber);
    }
    .synthesize-btn.active {
      border-color: var(--amber);
      color: var(--amber);
      background: rgba(255,171,0,0.1);
      box-shadow: 0 0 10px rgba(255,171,0,0.15);
    }
    .phase-btn-placeholder {
      opacity: 0.55;
      cursor: not-allowed;
      border-style: dashed !important;
    }

    /* ── Oscilloscope + Arrangement (label style; heights split) ───────────── */
    #scope-wrap,
    #arrangement-wrap {
      position: relative;
    }
    #scope {
      width: 100%;
      height: var(--waveform-h);
      display: block;
      border-radius: var(--radius);
      background: #060a0c;
    }
    .viz-label {
      position: absolute;
      top: 8px;
      left: 10px;
      z-index: 1;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--cyan-dim);
      pointer-events: none;
    }
    .viz-label-row {
      left: 10px;
      right: 10px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }
    .viz-time-span {
      text-transform: none;
      letter-spacing: 0.06em;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .arrangement-live-wrap {
      display: block;
      overflow: hidden;
    }
    .arrangement-live-canvas-wrap {
      height: var(--arrangement-h);
      min-width: 0;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: #060a0c;
      overflow: hidden;
    }
    #arrangement-canvas {
      display: block;
      width: 100%;
      height: 100%;
      vertical-align: top;
    }

    /* ── Layer mixer (flat list, logical hierarchy order) ──────────────────── */
    #mixer-layers {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }
    .mixer-add-tile {
      min-height: 140px;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      background: rgba(0, 0, 0, 0.2);
      color: var(--text-dim);
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .mixer-add-tile:hover {
      border-color: var(--cyan-dim);
      color: var(--cyan);
      background: rgba(0, 212, 255, 0.06);
    }
    .layer-ctrl {
      --layer-color: var(--amber);
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .layer-ctrl.inactive-phase {
      opacity: 0.68;
    }
    .layer-ctrl.inactive-toggle {
      border-color: #3a2f2f;
      box-shadow: none;
    }
    .layer-ctrl .layer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .layer-name {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--layer-color);
    }
    .layer-val {
      font-size: 11px;
      color: var(--layer-color);
      font-variant-numeric: tabular-nums;
      min-width: 28px;
      text-align: right;
    }
    .layer-val.muted { color: var(--text-dim); }
    .layer-desc {
      font-size: 10px;
      color: var(--text-dim);
    }
    .layer-chords {
      font-size: 9px;
      color: var(--text-mid);
      letter-spacing: 0.04em;
      line-height: 1.35;
    }
    .layer-chords .layer-chords-label {
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-right: 4px;
    }
    .active-wrap {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .active-wrap input {
      accent-color: var(--amber);
      width: 11px;
      height: 11px;
      cursor: pointer;
    }
    .layer-solo-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-dim);
      font-size: 9px;
      font-weight: 700;
      font-family: inherit;
      width: 22px;
      height: 20px;
      padding: 0;
      line-height: 1;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .layer-solo-btn:hover {
      border-color: var(--cyan-dim);
      color: var(--cyan);
    }
    .layer-solo-btn.active {
      border-color: var(--cyan);
      color: var(--cyan);
      background: rgba(0, 212, 255, 0.12);
      box-shadow: 0 0 8px rgba(0, 212, 255, 0.2);
    }
    .layer-edit-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-dim);
      font-size: 9px;
      font-weight: 600;
      font-family: inherit;
      padding: 2px 8px;
      cursor: pointer;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .layer-edit-btn:hover {
      border-color: var(--amber);
      color: var(--amber);
    }
    .layer-edit-btn.active {
      border-color: var(--amber);
      color: var(--amber);
      background: rgba(255, 171, 0, 0.12);
      box-shadow: 0 0 8px rgba(255, 171, 0, 0.15);
    }
    .layer-ctrl.is-solo-muted {
      opacity: 0.55;
    }
    .layer-ctrl.is-soloed {
      box-shadow: 0 0 0 1px rgba(0, 212, 255, 0.35);
    }
    .layer-ctrl.is-edit-focus {
      box-shadow: 0 0 0 1px rgba(255, 171, 0, 0.45);
    }

    /* ── Footer note ─────────────────────────────────────────────────────── */
    footer {
      text-align: center;
      font-size: 11px;
      color: var(--text-dim);
      padding-top: 8px;
    }
    footer a { color: var(--cyan-dim); text-decoration: none; }
    footer a:hover { color: var(--cyan); }

    /* ── Preset row (full width under sliders) ───────────────────────────── */
    #preset-ctrl {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
      padding-top: 2px;
      border-top: 1px solid var(--border);
    }
    #preset-ctrl .ctrl-label span {
      color: var(--text-mid);
      font-variant-numeric: normal;
    }
    #preset-select {
      width: 100%;
      max-width: none;
      box-sizing: border-box;
      padding: 8px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      line-height: 1.3;
    }
    #preset-select:hover { border-color: var(--cyan-dim); }
    #preset-select:focus {
      outline: none;
      border-color: var(--cyan);
      box-shadow: 0 0 0 1px rgba(0, 212, 255, 0.2);
    }
    #preset-description {
      margin: 0;
      font-size: 10px;
      line-height: 1.4;
      color: var(--text-dim);
      letter-spacing: 0.02em;
      max-height: 2.8em;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    #preset-description:empty { display: none; }

    @media (max-width: 640px) {
      #transport {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto;
        grid-template-areas:
          "play bpm"
          "vol vol"
          "rev rev"
          "info info"
          "preset preset";
        gap: 12px;
      }
      #transport #info-row { justify-self: stretch; }
      #transport #btn-play { justify-self: start; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <header>
    <h1>Procedural Music Studio</h1>
    <div id="status-pill">stopped</div>
  </header>

  <!-- ── Transport ───────────────────────────────────────────────────────── -->
  <div class="panel">
    <div id="transport">
      <button id="btn-play" title="Play / Stop">▶</button>

      <div class="ctrl" id="bpm-ctrl">
        <div class="ctrl-label"><span>BPM</span><span id="bpm-display">83</span></div>
        <input type="range" id="bpm-slider" min="50" max="120" value="83" step="1">
      </div>

      <div class="ctrl" id="vol-ctrl">
        <div class="ctrl-label"><span>Volume</span><span id="vol-display">100%</span></div>
        <input type="range" id="vol-slider" min="0" max="200" value="100" step="1">
      </div>

      <div class="ctrl" id="rev-ctrl">
        <div class="ctrl-label"><span>Reverb</span><span id="rev-display">15%</span></div>
        <input type="range" id="rev-slider" min="0" max="60" value="15" step="1">
      </div>

      <div id="info-row">
        <div class="info-chip">
          <span class="info-key">Phase</span>
          <span class="info-val" id="phase-val">—</span>
        </div>
        <button type="button" id="btn-synthesize" class="synthesize-btn" title="Post-loop evolving music (formerly Novel phase)">Synthesize</button>
      </div>

      <div class="ctrl" id="preset-ctrl">
        <div class="ctrl-label"><span>Preset</span></div>
        <select id="preset-select" aria-label="Music preset"></select>
        <p id="preset-description" class="preset-desc"></p>
      </div>
    </div>
  </div>

  <!-- ── Phase Timeline ──────────────────────────────────────────────────── -->
  <div class="panel">
    <div class="panel-title">Song Phases</div>
    <div id="phase-row"></div>
    <label class="phase-loop-wrap" title="Loop currently selected phase">
      <input type="checkbox" id="phase-loop">
      <span>Loop Selected Phase</span>
    </label>
  </div>

  <!-- ── Oscilloscope ────────────────────────────────────────────────────── -->
  <div class="panel" id="scope-wrap">
    <canvas id="scope"></canvas>
    <div id="scope-label" class="viz-label">Waveform</div>
  </div>

  <!-- ── Arrangement (live per-layer RMS) ─────────────────────────────────── -->
  <div class="panel" id="arrangement-panel" aria-label="Layer activity">
    <div id="arrangement-wrap">
      <div class="arrangement-live-wrap">
        <div class="arrangement-live-canvas-wrap">
          <canvas id="arrangement-canvas" width="300" height="54"></canvas>
        </div>
      </div>
      <div id="arrangement-label" class="viz-label viz-label-row">
        <span>Arrangement</span>
        <span id="arrangement-time-span" class="viz-time-span" title=""></span>
      </div>
    </div>
  </div>

  <!-- ── Layer Mixer ─────────────────────────────────────────────────────── -->
  <div class="panel">
    <div class="panel-title">Layer Mixer — multipliers applied on top of phase values</div>
    <div id="mixer-layers"></div>
  </div>

  <footer>
    <a href="https://github.com/TomGarske/ProceduralMusicStudio" target="_blank">GitHub</a>
    &nbsp;·&nbsp; 83 BPM · Web Audio API
  </footer>

</div>

<script src="music_engine_web.js"></script>
<script src="arrangement_live.js"></script>
<script>
// ── Layer definitions (order = rhythm → low end → harmony → melody → texture) ─
const LAYERS = [
  { id:'thump',     label:'Kick / Thump',   desc:'Pitch-swept sine kick drum', default:50 },
  { id:'beatpulse', label:'Beat Pulse',     desc:'Rhythmic sidechain-style pulse', default:50 },
  { id:'sub',       label:'Sub Bass',       desc:'Low-frequency sine foundation', default:50 },
  { id:'bass',      label:'Bass',           desc:'Root-note bass line', default:50 },
  { id:'piano',     label:'Piano',          desc:'Multi-partial chord stabs', default:50 },
  { id:'pad',       label:'String Pad',     desc:'Detuned sine pad with vibrato', default:50 },
  { id:'drone',     label:'Drone',          desc:'Held root + pulse (chorus only)', default:50 },
  { id:'arp',       label:'Arpeggio',       desc:'Triangle-wave melodic pattern', default:50 },
  { id:'echo',      label:'Echo / Arp 2',   desc:'Delayed arp copy with feedback', default:50 },
  { id:'shim',      label:'Shimmer',        desc:'High-freq sparkle (chorus only)', default:50 },
  { id:'voices',    label:'Ethereal Voices',desc:'Airy choir swells on phrase turns', default:50 },
];
/** Layers that follow the phase chord progression (shown in the mixer). */
const CHORD_LAYER_IDS = ['piano', 'bass', 'voices'];

/** Fallback phase labels if engine is not ready yet */
const ALL_SCRIPTED_PHASES = [
  { id: 'intro', label: 'Intro' },
  { id: 'build1', label: 'Build 1' },
  { id: 'verse1', label: 'Verse' },
  { id: 'chorus1', label: 'Chorus 1' },
  { id: 'break', label: 'Break' },
  { id: 'chorus2', label: 'Chorus 2' },
  { id: 'outro', label: 'Outro' },
];
let presetManifestList = [];
let activePresetJson = null;
let progressEls = {};
function refreshProgressEls() {
  progressEls = Object.fromEntries(
    Array.from(document.querySelectorAll('.phase-progress-fill')).map(el => [el.dataset.progress, el])
  );
}
function renderPhaseRow() {
  const row = document.getElementById('phase-row');
  if (!row) return;
  const list = engine?.getPhases?.()?.filter(p => p.id !== 'novel') ?? ALL_SCRIPTED_PHASES;
  const canRemove = list.length > 1;
  row.innerHTML = '';
  list.forEach(p => {
    const item = document.createElement('div');
    item.className = 'phase-item';
    item.dataset.phase = p.id;
    if (canRemove) {
      item.innerHTML = `
        <div class="phase-item-head">
          <button type="button" class="phase-btn" data-phase="${p.id}">${p.label}</button>
          <button type="button" class="phase-remove" data-phase="${p.id}" title="Remove phase from song" aria-label="Remove ${p.label}">×</button>
        </div>
        <div class="phase-progress"><div class="phase-progress-fill" data-progress="${p.id}"></div></div>
      `;
    } else {
      item.innerHTML = `
        <button type="button" class="phase-btn" data-phase="${p.id}">${p.label}</button>
        <div class="phase-progress"><div class="phase-progress-fill" data-progress="${p.id}"></div></div>
      `;
    }
    row.appendChild(item);
  });
  const placeholder = document.createElement('div');
  placeholder.className = 'phase-item';
  placeholder.innerHTML = `
    <button type="button" class="phase-btn phase-btn-placeholder" disabled data-phase="placeholder" title="Coming soon">New phase…</button>
    <div class="phase-progress"><div class="phase-progress-fill" data-progress="novel"></div></div>
  `;
  row.appendChild(placeholder);
  refreshProgressEls();
}
/** Layer slider 0–200 → multiplier 0–2× phase level (must match engine `setLayer` max). */
const LAYER_SLIDER_MAX = 200;
const LAYER_MULT_MAX = 2;

// ── Engine boot ──────────────────────────────────────────────────────────
let engine = null;
let scopeRaf = null;
const layerActive = {};  // active/inactive state per layer
let soloLayerId = null;  // null = all layers audible per mixer; else only this id is heard
let arrangementFocusLayerId = null;  // set by Edit: solo + highlight card + arrangement shows only this layer

function syncArrangementVizFocus() {
  if (window.ArrangementLive && typeof ArrangementLive.setFocusLayer === 'function') {
    ArrangementLive.setFocusLayer(arrangementFocusLayerId);
  }
}
let novelMode = false;
let phaseLoopEnabled = false;
let selectedPhaseId = 'intro';

function updateChordLayerLabels() {
  const seq = engine?.getState?.()?.chordSeq;
  const inner = seq && seq.length
    ? `<span class="layer-chords-label">Chords</span><span>${seq.join(' · ')}</span>`
    : `<span class="layer-chords-label">Chords</span><span>—</span>`;
  CHORD_LAYER_IDS.forEach(id => {
    const el = document.getElementById(`chords-${id}`);
    if (el) el.innerHTML = inner;
  });
}

async function bootEngine() {
  if (engine) return;
  if (!activePresetJson && presetManifestList.length) {
    try {
      const r = await fetch('presets/' + presetManifestList[0].file);
      activePresetJson = await r.json();
    } catch (e) {
      console.warn('Could not load preset file; using engine default.', e);
    }
  }
  const opts = activePresetJson ? { preset: activePresetJson } : {};
  engine = ProceduralMusic.create(opts);
  window.__PROC_ENGINE = engine;
  engine.setKey(activePresetJson?.defaults?.key ?? 'Gm');
  engine.setNovelMode(novelMode);
  engine.setPhaseLoop(phaseLoopEnabled ? selectedPhaseId : null);

  // Wire events
  engine.on('phaseMarker', ({ label }) => {
    if (window.ArrangementLive && typeof ArrangementLive.onPhaseMarker === 'function') {
      ArrangementLive.onPhaseMarker(label);
    }
  });
  engine.on('phase', ({ id, label }) => {
    document.getElementById('phase-val').textContent = label;
    const isNovelPhase = id === 'novel' || String(id).startsWith('novel-');
    const btnSyn = document.getElementById('btn-synthesize');
    if (btnSyn) btnSyn.classList.toggle('active', isNovelPhase);
    document.querySelectorAll('.phase-btn').forEach(b => {
      if (b.dataset.phase === 'placeholder') return;
      b.classList.toggle('active', !isNovelPhase && b.dataset.phase === id);
    });
    updateLayerDisplayFromState(engine.getState());
    // Re-apply layer multipliers after phase levels change (otherwise layers at 0 in the
    // first phase keep layerMult at 0 and stay silent after the phase advances).
    syncAllLayersToEngine();
    updateChordLayerLabels();
  });
  engine.on('beat', ({ phase, phaseProgress }) => {
    const progressKey = String(phase).startsWith('novel-') ? 'novel' : phase;
    Object.keys(progressEls).forEach(key => {
      const fill = progressEls[key];
      fill.style.width = key === progressKey ? `${Math.round((phaseProgress || 0) * 100)}%` : '0%';
    });
  });

  // Restore slider values
  engine.setVolume(parseFloat(document.getElementById('vol-slider').value) / 100);
  engine.setReverb(parseFloat(document.getElementById('rev-slider').value) / 100);
  engine.setBPM(parseInt(document.getElementById('bpm-slider').value));
  updateLayerDisplayFromState(engine.getState());
  syncAllLayersToEngine();
  updateChordLayerLabels();

  renderPhaseRow();

  // Start oscilloscope
  startScope();
}

// ── Play / Stop ───────────────────────────────────────────────────────────
const btnPlay = document.getElementById('btn-play');
const statusPill = document.getElementById('status-pill');

btnPlay.addEventListener('click', async () => {
  await bootEngine();
  const state = engine.getState();
  if (state.transportActive) {
    engine.stop();
    btnPlay.classList.remove('playing');
    btnPlay.innerHTML = '▶';
    statusPill.textContent = 'stopped';
    statusPill.classList.remove('playing');
  } else {
    engine.play();
    btnPlay.classList.add('playing');
    btnPlay.innerHTML = '■';
    statusPill.textContent = 'playing';
    statusPill.classList.add('playing');
  }
});

// ── Transport sliders ─────────────────────────────────────────────────────
document.getElementById('bpm-slider').addEventListener('input', e => {
  const v = parseInt(e.target.value);
  document.getElementById('bpm-display').textContent = v;
  if (engine) engine.setBPM(v);
});

document.getElementById('vol-slider').addEventListener('input', e => {
  const v = parseInt(e.target.value);
  const volDisplay = document.getElementById('vol-display');
  volDisplay.textContent = v > 100 ? `${v}% Boost` : `${v}%`;
  volDisplay.classList.toggle('boost', v > 100);
  if (engine) engine.setVolume(v / 100);
});

document.getElementById('rev-slider').addEventListener('input', e => {
  const v = parseInt(e.target.value);
  document.getElementById('rev-display').textContent = v + '%';
  if (engine) engine.setReverb(v / 100);
});

// ── Phase row: select phase, remove (×), restore strip ───────────────────
document.getElementById('phase-row').addEventListener('click', async e => {
  const rm = e.target.closest('.phase-remove');
  if (rm) {
    e.preventDefault();
    e.stopPropagation();
    const id = rm.dataset.phase;
    await bootEngine();
    if (engine.removePhase(id)) {
      const active = engine.getPhases().filter(p => p.id !== 'novel');
      if (selectedPhaseId === id) {
        selectedPhaseId = active[0]?.id ?? 'intro';
      }
      if (phaseLoopEnabled && !engine.getState().phaseLoopId) {
        const loopEl = document.getElementById('phase-loop');
        if (loopEl) loopEl.checked = false;
        phaseLoopEnabled = false;
      }
      engine.setPhaseLoop(phaseLoopEnabled ? selectedPhaseId : null);
      renderPhaseRow();
    }
    return;
  }
  const btn = e.target.closest('.phase-btn');
  if (!btn || btn.disabled || btn.dataset.phase === 'placeholder') return;
  await bootEngine();
  const selectedPhase = btn.dataset.phase;
  selectedPhaseId = selectedPhase;
  novelMode = false;
  engine.setNovelMode(false);
  document.getElementById('btn-synthesize')?.classList.remove('active');
  engine.setPhaseLoop(phaseLoopEnabled ? selectedPhaseId : null);
  if (!engine.getState().transportActive) {
    engine.play();
    btnPlay.classList.add('playing');
    btnPlay.innerHTML = '■';
    statusPill.textContent = 'playing';
    statusPill.classList.add('playing');
  }
  engine.seekToPhase(selectedPhase);
});

// ── Synthesize (post-loop / novel mode) — was “Novel Phase” in the timeline ─
document.getElementById('btn-synthesize').addEventListener('click', async () => {
  await bootEngine();
  selectedPhaseId = 'novel';
  novelMode = true;
  engine.setNovelMode(true);
  engine.setPhaseLoop(phaseLoopEnabled ? selectedPhaseId : null);
  if (!engine.getState().transportActive) {
    engine.play();
    btnPlay.classList.add('playing');
    btnPlay.innerHTML = '■';
    statusPill.textContent = 'playing';
    statusPill.classList.add('playing');
  }
  engine.seekToPhase('novel');
});

const phaseLoopEl = document.getElementById('phase-loop');
phaseLoopEl.addEventListener('change', () => {
  phaseLoopEnabled = phaseLoopEl.checked;
  if (!engine) return;
  const state = engine.getState();
  if (phaseLoopEnabled && state?.phase) {
    selectedPhaseId = String(state.phase).startsWith('novel-') ? 'novel' : state.phase;
  }
  engine.setPhaseLoop(phaseLoopEnabled ? selectedPhaseId : null);
});

// ── Layer mixer (flat list, hierarchy order) ───────────────────────────
const mixerLayersEl = document.getElementById('mixer-layers');
function getEffectiveLayerValue(layerId, sliderVal) {
  if (!layerActive[layerId]) return 0;
  if (soloLayerId !== null && layerId !== soloLayerId) return 0;
  return sliderVal;
}
function updateSoloStyles() {
  document.querySelectorAll('.layer-solo-btn').forEach(btn => {
    const id = btn.dataset.layer;
    btn.classList.toggle('active', soloLayerId !== null && soloLayerId === id);
  });
  document.querySelectorAll('.layer-ctrl').forEach(card => {
    const sl = card.querySelector('.layer-slider');
    const id = sl?.dataset?.layer;
    if (!id) return;
    card.classList.toggle('is-soloed', soloLayerId !== null && soloLayerId === id);
    card.classList.toggle('is-solo-muted', soloLayerId !== null && soloLayerId !== id);
  });
}
function updateEditStyles() {
  document.querySelectorAll('.layer-edit-btn').forEach(btn => {
    const id = btn.dataset.layer;
    btn.classList.toggle('active', arrangementFocusLayerId === id);
  });
  document.querySelectorAll('.layer-ctrl').forEach(card => {
    const sl = card.querySelector('.layer-slider');
    const id = sl?.dataset?.layer;
    if (!id) return;
    card.classList.toggle('is-edit-focus', arrangementFocusLayerId === id);
  });
}
function syncLayerToEngine(layerId) {
  if (!engine) return;
  const slider = document.getElementById(`sl-${layerId}`);
  if (!slider) return;
  const desiredVal = parseInt(slider.value, 10) / 100;
  const state = engine.getState();
  const baseVal = state?.phaseLevels?.[layerId] ?? 0;
  const effectiveVal = getEffectiveLayerValue(layerId, desiredVal);
  // Phase base 0: ratio is undefined; use 1 when the layer is active so gains follow the
  // phase once it turns on (otherwise mult stays 0 forever after intro).
  let mult;
  if (baseVal > 0) {
    mult = Math.min(LAYER_MULT_MAX, effectiveVal / baseVal);
  } else {
    mult = effectiveVal > 0 ? 1 : 0;
  }
  engine.setLayer(layerId, mult);
}
function syncAllLayersToEngine() {
  if (!engine) return;
  LAYERS.forEach(layer => syncLayerToEngine(layer.id));
}
function updateLayerDisplayFromState(state) {
  if (!state) return;
  const phaseLevels = state.phaseLevels || {};
  LAYERS.forEach(layer => {
    const card = document.getElementById(`sl-${layer.id}`)?.closest('.layer-ctrl');
    const slider = document.getElementById(`sl-${layer.id}`);
    const valEl = document.getElementById(`lv-${layer.id}`);
    if (!slider || !valEl || !card) return;
    const base = phaseLevels[layer.id] ?? 0;
    const effectiveVal = getEffectiveLayerValue(layer.id, base);
    // Keep slider at the phase/base value so Active checkbox is a true gate, not a value reset.
    slider.value = Math.round(base * 100);
    valEl.textContent = base.toFixed(2);
    valEl.classList.toggle('muted', effectiveVal === 0);
    slider.classList.toggle('muted', effectiveVal === 0);
    card.classList.toggle('inactive-phase', !layerActive[layer.id]);
  });
}

function buildLayerCard(layer) {
  const card = document.createElement('div');
  card.className = 'layer-ctrl';
  const defaultVal = layer.default ?? 50;
  const chordBlock = CHORD_LAYER_IDS.includes(layer.id)
    ? `<div class="layer-chords" id="chords-${layer.id}"></div>`
    : '';
  card.innerHTML = `
    <div class="layer-header">
      <span class="layer-name">${layer.label}</span>
      <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;justify-content:flex-end">
        <span class="layer-val ${defaultVal === 0 ? 'muted' : ''}" id="lv-${layer.id}">${(defaultVal / 100).toFixed(2)}</span>
        <button type="button" class="layer-solo-btn" data-layer="${layer.id}" title="Isolate this layer (solo)">S</button>
        <button type="button" class="layer-edit-btn" data-layer="${layer.id}" title="Solo this layer; arrangement shows only this layer">Edit</button>
        <label class="active-wrap" title="Enable/disable this layer">
          <input type="checkbox" id="active-${layer.id}" data-layer="${layer.id}" checked>
          <span>Active</span>
        </label>
      </div>
    </div>
    <input type="range" class="layer-slider" id="sl-${layer.id}"
           min="0" max="${LAYER_SLIDER_MAX}" value="${defaultVal}" step="1" data-layer="${layer.id}">
    <div class="layer-desc">${layer.desc}</div>
    ${chordBlock}
  `;

  const slider = card.querySelector(`#sl-${layer.id}`);
  const valEl  = card.querySelector(`#lv-${layer.id}`);
  const activeChk = card.querySelector(`#active-${layer.id}`);
  layerActive[layer.id] = true;
  slider.classList.toggle('muted', parseInt(slider.value) === 0);

  slider.addEventListener('input', e => {
    const v = parseInt(e.target.value, 10) / 100;
    valEl.textContent = v.toFixed(2);
    syncLayerToEngine(layer.id);
    valEl.classList.toggle('muted', v === 0);
    slider.classList.toggle('muted', v === 0);
  });

  const soloBtn = card.querySelector('.layer-solo-btn');
  soloBtn.addEventListener('click', () => {
    soloLayerId = soloLayerId === layer.id ? null : layer.id;
    if (arrangementFocusLayerId !== null && soloLayerId !== arrangementFocusLayerId) {
      arrangementFocusLayerId = null;
    }
    updateSoloStyles();
    updateEditStyles();
    syncArrangementVizFocus();
    syncAllLayersToEngine();
    updateLayerDisplayFromState(engine?.getState());
  });

  const editBtn = card.querySelector('.layer-edit-btn');
  editBtn.addEventListener('click', () => {
    if (arrangementFocusLayerId === layer.id) {
      arrangementFocusLayerId = null;
      soloLayerId = null;
    } else {
      arrangementFocusLayerId = layer.id;
      soloLayerId = layer.id;
    }
    updateSoloStyles();
    updateEditStyles();
    syncArrangementVizFocus();
    syncAllLayersToEngine();
    updateLayerDisplayFromState(engine?.getState());
  });

  activeChk.addEventListener('change', () => {
    layerActive[layer.id] = activeChk.checked;
    card.classList.toggle('inactive-toggle', !activeChk.checked);
    syncLayerToEngine(layer.id);
    updateLayerDisplayFromState(engine?.getState());
  });
  return card;
}

LAYERS.forEach(layer => {
  mixerLayersEl.appendChild(buildLayerCard(layer));
});
const mixerAddTile = document.createElement('button');
mixerAddTile.type = 'button';
mixerAddTile.className = 'mixer-add-tile';
mixerAddTile.textContent = '+ Add new layer';
mixerAddTile.title = 'Add a new layer (coming soon)';
mixerAddTile.addEventListener('click', () => {
  /* Placeholder — future: add user-defined layer slot */
});
mixerLayersEl.appendChild(mixerAddTile);
updateSoloStyles();
updateEditStyles();
updateChordLayerLabels();

if (window.ArrangementLive) {
  ArrangementLive.init(LAYERS.map(l => l.id));
}

// ── Oscilloscope ──────────────────────────────────────────────────────────
const canvas = document.getElementById('scope');
const ctx2d  = canvas.getContext('2d');
let scopeCssW = 0;
let scopeCssH = 0;
let scopeTimeBuf = null;

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  scopeCssW = rect.width;
  scopeCssH = rect.height;
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  ctx2d.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function drawScope() {
  scopeRaf = requestAnimationFrame(drawScope);

  const W = scopeCssW;
  const H = scopeCssH;

  ctx2d.clearRect(0, 0, W, H);
  ctx2d.fillStyle = '#060a0c';
  ctx2d.fillRect(0, 0, W, H);

  // Grid lines
  ctx2d.strokeStyle = '#0d1a1f';
  ctx2d.lineWidth = 1;
  const gridLines = 4;
  for (let i = 1; i < gridLines; i++) {
    const y = (H / gridLines) * i;
    ctx2d.beginPath(); ctx2d.moveTo(0, y); ctx2d.lineTo(W, y); ctx2d.stroke();
  }
  // Center line
  ctx2d.strokeStyle = '#0d2a30';
  ctx2d.beginPath(); ctx2d.moveTo(0, H/2); ctx2d.lineTo(W, H/2); ctx2d.stroke();

  if (!engine) {
    ctx2d.strokeStyle = 'rgba(0,212,255,0.2)';
    ctx2d.lineWidth = 1.5;
    ctx2d.beginPath();
    ctx2d.moveTo(0, H/2);
    ctx2d.lineTo(W, H/2);
    ctx2d.stroke();
    return;
  }

  const analyser = engine.getAnalyser();
  if (!analyser) return;

  if (!scopeTimeBuf || scopeTimeBuf.length !== analyser.fftSize) {
    scopeTimeBuf = new Float32Array(analyser.fftSize);
  }
  analyser.getFloatTimeDomainData(scopeTimeBuf);
  const buf = scopeTimeBuf;

  let start = 0;
  for (let i = 1; i < buf.length - 1; i++) {
    if (buf[i-1] < 0 && buf[i] >= 0) { start = i; break; }
  }

  const sliceW = W / Math.min(1024, buf.length);
  const playing = btnPlay.classList.contains('playing');

  ctx2d.lineWidth = 1.8;
  ctx2d.strokeStyle = playing ? '#00d4ff' : 'rgba(0,212,255,0.3)';
  ctx2d.shadowBlur = playing ? 8 : 0;
  ctx2d.shadowColor = '#00d4ff';
  ctx2d.beginPath();

  let drawn = 0;
  for (let i = start; i < buf.length && drawn < 1024; i++, drawn++) {
    const x = drawn * sliceW;
    const y = (1 - (buf[i] * 1.38 + 1) * 0.5) * H;
    if (drawn === 0) ctx2d.moveTo(x, y);
    else ctx2d.lineTo(x, y);
  }
  ctx2d.stroke();
  ctx2d.shadowBlur = 0;
}

function startScope() {
  if (!scopeRaf) drawScope();
}

// Start idle scope immediately
drawScope();

// ── Keyboard shortcuts ────────────────────────────────────────────────────
document.addEventListener('keydown', async e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') {
    e.preventDefault();
    btnPlay.click();
  }
  // Number keys 1–9 → Nth active scripted phase
  const idx = parseInt(e.key, 10) - 1;
  if (idx >= 0 && idx < 9) {
    await bootEngine();
    const phases = engine.getPhases().filter(p => p.id !== 'novel');
    if (idx < phases.length) engine.seekToPhase(phases[idx].id);
  }
});

async function initPresets() {
  try {
    const m = await fetch('presets/manifest.json').then(r => r.json());
    presetManifestList = m.presets || [];
    const sel = document.getElementById('preset-select');
    if (!sel) return;
    sel.innerHTML = '';
    for (const p of presetManifestList) {
      const opt = document.createElement('option');
      opt.value = p.file;
      opt.textContent = p.name;
      sel.appendChild(opt);
    }
    const first = presetManifestList[0];
    if (first) {
      const r = await fetch('presets/' + first.file);
      activePresetJson = await r.json();
      sel.value = first.file;
    }
    updatePresetHint();
  } catch (e) {
    console.warn('Preset manifest/load failed; using bundled engine default.', e);
    presetManifestList = [];
  }
}

function updatePresetHint() {
  const el = document.getElementById('preset-description');
  if (!el || !activePresetJson) return;
  const d = (activePresetJson.description || '').trim();
  el.textContent = d;
  el.title = d.length > 120 ? d : '';
}

document.getElementById('preset-select').addEventListener('change', async () => {
  const sel = document.getElementById('preset-select');
  const file = sel.value;
  const entry = presetManifestList.find(p => p.file === file);
  if (!entry) return;
  try {
    const r = await fetch('presets/' + file);
    activePresetJson = await r.json();
    updatePresetHint();
    if (engine) {
      const wasPlaying = engine.getState().playing;
      if (wasPlaying) engine.stop();
      engine.applyPreset(activePresetJson);
      if (wasPlaying) engine.play();
      const bpm = activePresetJson.defaults?.bpm ?? 83;
      document.getElementById('bpm-slider').value = bpm;
      document.getElementById('bpm-display').textContent = Math.round(bpm);
      const rev = Math.round((activePresetJson.defaults?.reverb ?? 0.15) * 100);
      document.getElementById('rev-slider').value = rev;
      document.getElementById('rev-display').textContent = rev + '%';
      engine.setBPM(bpm);
      engine.setReverb(rev / 100);
      renderPhaseRow();
      syncAllLayersToEngine();
      updateChordLayerLabels();
    }
  } catch (err) {
    console.error('Failed to load preset', err);
  }
});

initPresets().then(() => renderPhaseRow());
</script>
